<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>غير متصل - إيدو برو</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background-color: #f5f5f5;
      color: #333;
      text-align: center;
    }
    
    .container {
      max-width: 600px;
      padding: 40px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }
    
    h1 {
      color: #235390;
      margin-bottom: 20px;
    }
    
    p {
      line-height: 1.6;
      margin-bottom: 20px;
    }
    
    button {
      background-color: #235390;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      transition: background-color 0.3s;
    }
    
    button:hover {
      background-color: #1a3d6d;
    }
    
    .icon {
      font-size: 48px;
      margin-bottom: 20px;
    }

    html[lang="en"] {
      direction: ltr;
    }

    .en {
      display: none;
    }

    html[lang="en"] .ar {
      display: none;
    }

    html[lang="en"] .en {
      display: block;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background-color: #1f2937;
        color: #f9fafb;
      }
      
      .container {
        background-color: #111827;
      }
      
      p {
        color: #d1d5db;
      }
      
      .icon {
        color: #6b7280;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🌐</div>
    <h1>لا يوجد اتصال بالإنترنت</h1>
    <p>عذراً، يبدو أنك غير متصل بالإنترنت حالياً. يرجى التحقق من اتصالك والمحاولة مرة أخرى.</p>
    <button onclick="window.location.reload()">إعادة المحاولة</button>
  </div>
  
  <script>
    // Check if we're back online
    window.addEventListener('online', () => {
      window.location.reload();
    });

    // Check browser language and change language if needed
    const savedLanguage = localStorage.getItem('language');
    if (savedLanguage === 'en' || (navigator.language.startsWith('en') && !savedLanguage)) {
      document.documentElement.lang = 'en';
      document.documentElement.dir = 'ltr';
    }

    // Check for dark mode preference
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const savedTheme = localStorage.getItem('theme');
    
    if (savedTheme === 'dark' || (prefersDark && !savedTheme)) {
      document.documentElement.classList.add('dark');
    }
  </script>
</body>
</html>
